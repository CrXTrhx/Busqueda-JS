<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Buscador de Autos</title>
    <link rel="stylesheet" href="./assets/css/normalize.css">
    <link rel="stylesheet" href="./assets/css/skeleton.css">
    <link rel="stylesheet" href="./assets/css/app.css">
</head>
<body>
    <header class="header">
        <h1>🚗 Buscador de Autos</h1>
        <p class="header-subtitle">Encuentra el auto perfecto para ti</p>
    </header>

    <div class="contenedor">
        <div class="filtros-section">
            <h2>Filtros de búsqueda</h2>
            <form id="buscador">
                <label for="marca">Marca</label>
                <select id="marca">
                    <option value="">Seleccione</option>
                    <option value="Audi">Audi</option>
                    <option value="BMW">BMW</option>
                    <option value="Mercedes Benz">Mercedes Benz</option>
                    <option value="Chevrolet">Chevrolet</option>
                    <option value="Ford">Ford</option>
                    <option value="Dodge">Dodge</option>
                </select>
                
                <label for="year">Año</label>
                <select id="year">
                    <option value="">Seleccione</option>
                </select>
                
                <label for="minimo">Precio Mínimo</label>
                <select id="minimo">
                    <option value="">Seleccione</option>
                    <option value="20000">20,000</option>
                    <option value="30000">30,000</option>
                    <option value="40000">40,000</option>
                    <option value="50000">50,000</option>
                    <option value="60000">60,000</option>
                    <option value="70000">70,000</option>
                    <option value="80000">80,000</option>
                    <option value="90000">90,000</option>
                </select>
                
                <label for="maximo">Precio Máximo</label>
                <select id="maximo">
                    <option value="">Seleccione</option>
                    <option value="20000">20,000</option>
                    <option value="30000">30,000</option>
                    <option value="40000">40,000</option>
                    <option value="50000">50,000</option>
                    <option value="60000">60,000</option>
                    <option value="70000">70,000</option>
                    <option value="80000">80,000</option>
                    <option value="90000">90,000</option>
                </select>
                
                <label for="puertas">Puertas</label>
                <select id="puertas">
                    <option value="">Seleccione</option>
                    <option value="2">2</option>
                    <option value="4">4</option>
                </select>
                
                <label for="transmision">Transmisión</label>
                <select id="transmision">
                    <option value="">Seleccione</option>
                    <option value="automatico">Automática</option>
                    <option value="manual">Manual</option>
                </select>
                
                <label for="color">Color</label>
                <select id="color">
                    <option value="">Seleccione</option>
                    <option value="Negro">Negro</option>
                    <option value="Azul">Azul</option>
                    <option value="Blanco">Blanco</option>
                    <option value="Rojo">Rojo</option>
                </select>
            </form>
        </div>

        <div class="resultados-section">
            <h2>Resultados</h2>
            <div id="resultado" class="grid-autos"></div>
        </div>
    </div>
    <script src="./assets/js/db.js"></script>
    <script src="./assets/js/app.js"></script>
    
</body>
</html>
